<svg xmlns="http://www.w3.org/2000/svg" width="360" height="270" viewBox="0 0 360 270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="360" height="270" rx="24" fill="url(#bg)"/>
  
  <g filter="url(#shadow)">
    <rect x="139" y="48" width="82" height="154" rx="42" fill="url(#mouseGrad)"/>
    <defs><linearGradient id="mouseGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#64748b"/></linearGradient></defs>
    <rect x="176" y="68" width="8" height="28" rx="4" fill="#38bdf8"/>
    <line x1="180" y1="108" x2="180" y2="178" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
  </g>
  <text x="180" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">Mouse</text>
</svg>